version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: profile-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    networks:
      - profile-network

  influxdb:
    image: influxdb:1.8
    container_name: k6-influxdb
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    environment:
      INFLUXDB_DB: k6
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - profile-network

  grafana:
    image: grafana/grafana:latest
    container_name: k6-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_DOMAIN: localhost
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3000}/
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_RENDERING_RENDERER_TOKEN: ${GRAFANA_RENDERER_TOKEN:-local-renderer-token}
      GF_LOG_FILTERS: rendering:debug
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - influxdb
      - renderer
    networks:
      - profile-network

  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana-renderer
    restart: unless-stopped
    environment:
      AUTH_TOKEN: ${GRAFANA_RENDERER_TOKEN:-local-renderer-token}
    networks:
      - profile-network

volumes:
  mysql-data:
    driver: local
  influxdb-data:
    driver: local
  grafana-data:
    driver: local

networks:
  profile-network:
    driver: bridge