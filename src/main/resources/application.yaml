# 서버 설정
server:
  port: 8080
  servlet:
    context-path: /

# Spring 설정
spring:
  config:
    import: optional:file:./.env[.properties]

  application:
    name: profile-stack-api

  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # MySQL 데이터베이스 설정
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30_000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600_000
      pool-name: ProfileTechstackAPIHikariCP

  # SQL 로깅 설정
  sql:
    init:
      mode: always
      platform: mysql
      encoding: utf-8
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
    open-in-view: false

# 로깅 설정
logging:
  level:
    root: INFO
    com.study.profile_stack_api: DEBUG
    org.springframework.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# JWT 설정
jwt:
  secret: ${SECRET_KEY}
  access-token-expiration: 1_800_000    # 30분 (밀리초)
  refresh-token-expiration: 604_800_000 # 7일 (밀리초)

# Swagger UI 설정 추가
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.study.profile_stack_api

# Discord Webhook 설정
discord:
  webhook:
    url: ${DISCORD_WEBHOOK_URL}
    enabled: ${DISCORD_WEBHOOK_ENABLED:false}
    username: ${DISCORD_WEBHOOK_USERNAME}
    avatar-url: ${DISCORD_WEBHOOK_AVATAR_URL}
